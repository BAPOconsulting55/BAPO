<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BAPO Consulting — Niranjan R</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #0d0d0d;
      --deep:      #111827;
      --gold:      #b8933f;
      --gold-lt:   #d4af6a;
      --gold-pale: #f5ead6;
      --cream:     #faf7f2;
      --white:     #ffffff;
      --muted:     #6b7280;
      --border:    #e8e0d0;
      --card-bg:   #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--ink);
      overflow-x: hidden;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(184,147,63,0.2);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 700;
      color: var(--gold-lt);
      letter-spacing: 1px;
    }
    .nav-logo span { color: var(--white); }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a {
      font-size: 12px; font-weight: 500; letter-spacing: 1.5px;
      text-transform: uppercase; color: rgba(255,255,255,0.65);
      text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold-lt); }
    .nav-cta {
      background: var(--gold);
      color: var(--white) !important;
      padding: 9px 20px;
      border-radius: 4px;
      font-weight: 600 !important;
      transition: background 0.2s !important;
    }
    .nav-cta:hover { background: var(--gold-lt) !important; color: var(--ink) !important; }

    /* ─── HERO ─── */
    .hero {
      min-height: 100vh;
      background: var(--deep);
      position: relative;
      display: flex; align-items: center;
      overflow: hidden;
      padding: 120px 48px 80px;
    }
    .hero-bg {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 60% at 70% 40%, rgba(184,147,63,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 40% 50% at 10% 80%, rgba(184,147,63,0.06) 0%, transparent 60%);
    }
    .hero-grid-lines {
      position: absolute; inset: 0; pointer-events: none; overflow: hidden;
      opacity: 0.04;
    }
    .hero-grid-lines::before {
      content: '';
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.8) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.8) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-inner {
      position: relative; max-width: 1100px; margin: 0 auto; width: 100%;
      display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
    }
    .hero-left { }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 11px; font-weight: 600; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 24px;
    }
    .hero-eyebrow::before {
      content: ''; display: block; width: 32px; height: 1px; background: var(--gold);
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 5.5vw, 72px);
      font-weight: 700; line-height: 1.08;
      color: var(--white); margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .hero-title em {
      font-style: italic; color: var(--gold-lt);
    }
    .hero-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 2.2vw, 26px);
      font-weight: 400; font-style: italic;
      color: rgba(255,255
